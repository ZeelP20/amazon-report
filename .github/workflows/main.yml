name: Daily Report

on:
  schedule:
    - cron: '30 3 * * *'   # 9 AM IST

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install pandas openpyxl requests beautifulsoup4 selenium webdriver-manager

      - run: python script.py
